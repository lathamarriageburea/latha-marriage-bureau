name: latha_marriage_bureau
description: Premium Marriage Bureau Website
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Fonts
  google_fonts: ^6.2.1

  # Success Stories Carousel
  carousel_slider: ^5.0.0

  # Social Media Icons
  font_awesome_flutter: ^10.8.0

  # Phone / Email / WhatsApp Launch
  url_launcher: ^6.3.1

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  # Image Upload
  file_picker: ^10.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/success/
    - assets/download/
  
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"